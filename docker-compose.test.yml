services:
  db_test:
    image: postgres:16
    environment:
      POSTGRES_DB: ourtable_test
      POSTGRES_USER: ourtable
      POSTGRES_PASSWORD: ourtable
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ourtable"]
      interval: 5s
      timeout: 5s
      retries: 5
